name: Docs Quality

on:
  pull_request:
    paths:
      - "docs/skills/**"
  push:
    branches:
      - main
    paths:
      - "docs/skills/**"
  merge_group:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Validate skill docs
        shell: bash
        run: |
          set -euo pipefail
          SKILLS_DIR="docs/skills"
          INDEX="$SKILLS_DIR/README.md"
          failed=0

          echo "=== Frontmatter check ==="
          for f in "$SKILLS_DIR"/*.md; do
            name=$(basename "$f")
            [[ "$name" == "README.md" ]] && continue
            if ! head -1 "$f" | grep -q "^---$"; then
              echo "::error file=$f::$name is missing YAML frontmatter — add name: and description: fields"
              failed=1
              continue
            fi
            if ! awk '/^---$/{c++;if(c==2)exit} c==1' "$f" | grep -q "^name:"; then
              echo "::error file=$f::$name frontmatter missing required 'name' field"
              failed=1
            fi
            if ! awk '/^---$/{c++;if(c==2)exit} c==1' "$f" | grep -q "^description:"; then
              echo "::error file=$f::$name frontmatter missing required 'description' field"
              failed=1
            fi
          done

          echo "=== Line count check ==="
          for f in "$SKILLS_DIR"/*.md; do
            name=$(basename "$f")
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 500 ]; then
              echo "::error file=$f::$name has $lines lines (limit: 500 — extract long content to a separate reference file)"
              failed=1
            elif [ "$lines" -gt 350 ]; then
              echo "::warning file=$f::$name has $lines lines (warning threshold: 350)"
            fi
          done

          echo "=== README routing table coverage ==="
          for f in "$SKILLS_DIR"/*.md; do
            name=$(basename "$f")
            [[ "$name" == "README.md" ]] && continue
            if ! grep -q "$name" "$INDEX"; then
              echo "::error file=$INDEX::$name is not listed in README.md routing table"
              failed=1
            fi
          done

          exit "$failed"
