name: Reusable Build and Push
on:
  workflow_call:
    inputs:
      image_flavors:
        description: "JSON string of flavors to build, '[main, nvidia]'"
        default: "['main', 'nvidia-open']"
        type: string
      brand_name:
        description: "The Brand Name: bluefin"
        required: true
        default: bluefin
        type: string
      stream_name:
        description: "The Fedora Version: stable, latest, or beta"
        required: true
        type: string
      kernel_pin:
        description: "The full kernel version to pin"
        type: string

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ inputs.brand_name}}-${{ inputs.stream_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  build_container:
    name: image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        image_flavor: ${{ fromJson(inputs.image_flavors) }}
        base_name: ["${{ inputs.brand_name }}"]
        stream_name: ["${{ inputs.stream_name }}"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Setup Runner
        uses: projectbluefin/actions/bootc-build/setup-runner@baa79e6fae327ae9e7ec056cd2ea20fca1525ecc
        with:
          install-tools: '["just"]'

      - name: Check Just Syntax
        shell: bash
        run: just check

      - name: Image Name
        shell: bash
        run: |
          IMAGE_NAME="$(just image_name ${{ matrix.base_name }} ${{ matrix.stream_name }} ${{ matrix.image_flavor }})"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV

      - name: Cache Setup
        id: cache-setup
        shell: bash
        env:
          MATRIX_BASE_NAME: ${{ matrix.base_name }}
          MATRIX_STREAM_NAME: ${{ matrix.stream_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          fedora_version=$(just fedora_version "${MATRIX_BASE_NAME}" "${MATRIX_STREAM_NAME}")
          CACHE_NAME="${MATRIX_BASE_NAME}-${fedora_version}"
          ALLOW_CACHE_WRITE="false"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" || "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            ALLOW_CACHE_WRITE="true"
          fi
          echo "cache_name=${CACHE_NAME}" >> "$GITHUB_OUTPUT"
          echo "allow_cache_write=${ALLOW_CACHE_WRITE}" >> "$GITHUB_OUTPUT"

      - name: Restore DNF Package Cache
        uses: projectbluefin/actions/bootc-build/dnf-cache@baa79e6fae327ae9e7ec056cd2ea20fca1525ecc
        with:
          action: restore
          cache-name: ${{ steps.cache-setup.outputs.cache_name }}
          image-flavor: ${{ matrix.image_flavor }}

      - name: Build Image
        id: build-image
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo -E $(command -v just) repo_organization="${{ github.repository_owner }}" \
                    build-ghcr "${{ matrix.base_name }}" \
                               "${{ matrix.stream_name }}" \
                               "${{ matrix.image_flavor }}" \
                               "${{ inputs.kernel_pin }}"

      - name: Save DNF Package Cache
        if: always() && !cancelled()
        uses: projectbluefin/actions/bootc-build/dnf-cache@baa79e6fae327ae9e7ec056cd2ea20fca1525ecc
        with:
          action: save
          cache-name: ${{ steps.cache-setup.outputs.cache_name }}
          image-flavor: ${{ matrix.image_flavor }}
          allow-write: ${{ steps.cache-setup.outputs.allow_cache_write }}

      - name: Rechunk Image
        id: rechunk-image
        uses: projectbluefin/actions/bootc-build/chunka@baa79e6fae327ae9e7ec056cd2ea20fca1525ecc
        with:
          source-image: localhost/${{ env.IMAGE_NAME }}:${{ matrix.stream_name }}

      - name: Secureboot Check
        id: secureboot
        shell: bash
        run: |
          sudo -E $(command -v just) secureboot "${{ matrix.base_name }}" \
                          "${{ matrix.stream_name }}" \
                          "${{ matrix.image_flavor }}"

      - name: Get Version Label
        id: version-label
        shell: bash
        run: |
          echo "value=$(sudo podman inspect localhost/${{ env.IMAGE_NAME }}:${{ matrix.stream_name }} | jq -r '.[].Config.Labels["org.opencontainers.image.version"]')" >> "$GITHUB_OUTPUT"

      - name: Generate Tags
        id: generate-tags
        uses: projectbluefin/actions/bootc-build/generate-tags@baa79e6fae327ae9e7ec056cd2ea20fca1525ecc
        with:
          base-name: ${{ matrix.base_name }}
          stream-name: ${{ matrix.stream_name }}
          image-flavor: ${{ matrix.image_flavor }}
          kernel-pin: ${{ inputs.kernel_pin }}
          version-label: ${{ steps.version-label.outputs.value }}
          event-name: ${{ github.event_name }}
          pr-number: ${{ github.event.number }}

      - name: Tag Image for Push
        shell: bash
        run: |
          sudo podman tag \
            "localhost/${{ env.IMAGE_NAME }}:${{ matrix.stream_name }}" \
            "${{ env.IMAGE_NAME }}:${{ steps.generate-tags.outputs.default-tag }}"

      - name: Push to GHCR
        id: push
        if: github.event_name != 'pull_request'
        uses: projectbluefin/actions/bootc-build/push-image@baa79e6fae327ae9e7ec056cd2ea20fca1525ecc
        with:
          image-name: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.generate-tags.outputs.tags }}
          default-tag: ${{ steps.generate-tags.outputs.default-tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign and Publish
        if: github.event_name != 'pull_request'
        uses: projectbluefin/actions/bootc-build/sign-and-publish@baa79e6fae327ae9e7ec056cd2ea20fca1525ecc
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          digest: ${{ steps.push.outputs.digest }}
          signing-mode: key
          signing-key: ${{ secrets.SIGNING_SECRET }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          certificate-identity-regexp: "https://github.com/${{ github.repository_owner }}/(bluefin|actions)/.github/workflows/"

  check:
    name: Check all ${{ matrix.stream_name }} builds successful
    if: always()
    runs-on: ubuntu-latest
    needs: [build_container]
    steps:
      - name: Check Jobs
        env:
          JOBS: ${{ toJson(needs) }}
        run: |
          echo "Job status:"
          echo $JOBS | jq -r 'to_entries[] | " - \(.key): \(.value.result)"'

          for i in $(echo $JOBS | jq -r 'to_entries[] | .value.result'); do
            if [ "$i" != "success" ] && [ "$i" != "skipped" ]; then
              echo ""
              echo "Status check not okay!"
              exit 1
            fi
          done
